name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

# contents: write required so the reusable phpcs job can commit phpcbf
# auto-fixes back to the PR branch (GH enforces caller-level permission scope).
permissions:
  contents: write

jobs:
  ci:
    uses: peptide-repo/peptide-e2e/.github/workflows/ci.yml@main
    with:
      tests: stubs
      has_js: false
      line_limit_paths: includes
    secrets: inherit
